services:
  db:
    image: mysql:8.0
    container_name: mysql_tenistas
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tenistasdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend_tenistas
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    container_name: frontend_tenistas
    restart: always
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data: